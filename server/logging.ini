[loggers]
keys=root,uvicorn,uvicorn.error,uvicorn.access

[handlers]
keys=console

[formatters]
keys=default

[logger_root]
level=INFO
handlers=console
qualname=root
propagate=0

[logger_uvicorn]
level=INFO
handlers=console
qualname=uvicorn
propagate=0

[logger_uvicorn.error]
level=INFO
handlers=console
qualname=uvicorn.error
propagate=0

[logger_uvicorn.access]
level=INFO
handlers=console
qualname=uvicorn.access
propagate=0

[handler_console]
class=logging.StreamHandler
level=INFO
formatter=default
args=(sys.stdout,)

[formatter_default]
class=server.color_formatter.ColorFormatter


[logger_watchfiles.main]
level=WARNING
handlers=console
qualname=watchfiles.main
propagate=0